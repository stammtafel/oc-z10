<p>
Tryout dynamic brick texture and shape with svg filters.
</p>

<svg id="svgfilters" height="0" style="width: 0; height: 0; visibility: hidden; position: absolute;" width="0" height="0" xmlns="http://www.w3.org/2000/svg" version="1.1">
  <defs>
    <filter id="wiggle-brickshape">
      <feturbulence basefrequency="0.02" id="turbulence-3" numoctaves="3" result="noise" seed="5"></feturbulence>
      <fedisplacementmap in2="noise" in="SourceGraphic" scale="15"></fedisplacementmap>
    </filter>
    <filter id="wiggle-brick">
      <feturbulence basefrequency="0.1" id="turbulence-3" numoctaves="2" result="noise" seed="125"></feturbulence>
      <fedisplacementmap in2="noise" in="SourceGraphic" scale="100"></fedisplacementmap>
    </filter>
  </defs>
</svg>

<div class="brick-wrapper">
<div class="brick-shape"><div class="brick-detail"></div></div>
